# NAS deployment (self-hosted GitHub Actions runner builds & runs this locally).
# Exposes the app on host port 11112.
#
# App Store Connect credentials are passed as environment variables (interpolated
# from the runner's environment, which the deploy workflow fills from GitHub
# Secrets). Nothing sensitive is written to disk or baked into the image, and the
# container keeps the values across restarts/NAS reboots.

services:
  appscreen:
    build:
      context: .
      dockerfile: Dockerfile
    image: appscreen:latest
    container_name: appscreen
    ports:
      - "11112:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
      - ASC_ISSUER_ID=${ASC_ISSUER_ID:-}
      - ASC_KEY_ID=${ASC_KEY_ID:-}
      - ASC_PRIVATE_KEY=${ASC_PRIVATE_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
